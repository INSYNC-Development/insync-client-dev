<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huly Button – Cursor-Following Gradient</title>
    <style>
      /* ───────── Reset & Page ───────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0e0e0e;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }

      /* ───────── Wrapper ───────── */
      .button_wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
        z-index: 10;
      }

      /* ───────── Rotating border glow ───────── */
      .button_border_glow {
        position: absolute;
        left: 50%;
        top: 50%;
        height: calc(100% + 9px);
        width: calc(100% + 9px);
        translate: -50% -50%;
        border-radius: 9999px;
        will-change: transform;
        pointer-events: none;
      }

      .button_border_glow.is-secondary {
        scale: -1 1;
        opacity: 0;
      }

      .button_border_glow_inner {
        position: relative;
        height: 100%;
        width: 100%;
        border-radius: 9999px;
        background: conic-gradient(
          from 0deg,
          transparent 0%,
          rgba(255, 255, 255, 0.45) 8%,
          transparent 16%
        );
        -webkit-mask: radial-gradient(
          farthest-side at center,
          transparent calc(100% - 2px),
          #fff calc(100% - 2px)
        );
        mask: radial-gradient(
          farthest-side at center,
          transparent calc(100% - 2px),
          #fff calc(100% - 2px)
        );
      }

      /* ───────── Outer gradient glow layers ───────── */
      .button_outer_glow {
        position: absolute;
        box-sizing: content-box;
        height: 100%;
        width: 100%;
        border-radius: 9999px;
        border-color: transparent;
        pointer-events: none;
      }

      /* Layer 1: blur(7px), z-index 30, 2px border */
      .button_outer_glow.is-1 {
        left: -0.125rem;
        top: -0.125rem;
        z-index: 30;
        border: 2px solid transparent;
        filter: blur(7px);
        --glow-angle: 90deg;
        background: linear-gradient(transparent, transparent) padding-box,
          linear-gradient(
              var(--glow-angle),
              rgba(255, 177, 153, 0) 6.11%,
              rgba(255, 177, 153, 0.2) 53.57%,
              #ff7950 93.6%
            )
            border-box;
      }

      /* Layer 2: blur(2px), z-index 10, 2px border */
      .button_outer_glow.is-2 {
        left: -0.125rem;
        top: -0.125rem;
        z-index: 10;
        border: 2px solid transparent;
        filter: blur(2px);
        --glow-angle: 90deg;
        background: linear-gradient(transparent, transparent) padding-box,
          linear-gradient(
              var(--glow-angle),
              rgba(255, 177, 153, 0) 38.1%,
              rgba(255, 177, 153, 0.2) 82.47%,
              #ff7950 93.3%
            )
            border-box;
      }

      /* Layer 3: blur(15px), z-index 20, 3px border */
      .button_outer_glow.is-3 {
        left: -3px;
        top: -3px;
        z-index: 20;
        border: 3px solid transparent;
        filter: blur(15px);
        --glow-angle: 90deg;
        background: linear-gradient(transparent, transparent) padding-box,
          linear-gradient(
              var(--glow-angle),
              rgba(255, 137, 100, 0.2) 46.45%,
              #cd3100 98.59%
            )
            border-box;
      }

      /* ───────── The actual button ───────── */
      .button_cta {
        position: relative;
        z-index: 40;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 40px;
        padding: 0 52px 0 59px;
        border-radius: 9999px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        background: #d1d1d1;
        text-decoration: none;
        overflow: hidden;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      /* ───────── Inner gradient blob ───────── */
      .button_gradient {
        position: absolute;
        inset: 0;
        z-index: -1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 204px;
        transform: translateX(114px);
        pointer-events: none;
      }

      .button_gradient_circle {
        position: absolute;
        top: 50%;
        translate: 0 -50%;
        width: 121px;
        height: 121px;
        border-radius: 50%;
        background: radial-gradient(
          50% 50% at 50% 50%,
          #fffff5 3.5%,
          #ffaa81 26.5%,
          #ffda9f 37.5%,
          rgba(255, 170, 129, 0.5) 49%,
          rgba(210, 106, 58, 0) 92.5%
        );
      }

      .button_gradient_ellipse {
        position: absolute;
        top: 50%;
        translate: 0 -50%;
        width: 204px;
        height: 103px;
        filter: blur(5px);
        background: radial-gradient(
          43.3% 44.23% at 50% 49.51%,
          #fffff7 29%,
          #fffacd 48.5%,
          #f4d2bf 60.71%,
          rgba(214, 211, 210, 0) 100%
        );
      }

      /* ───────── Label & icon ───────── */
      .button_text {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: -0.015em;
        color: #5a250a;
        white-space: nowrap;
        user-select: none;
      }

      .button_main_icon {
        width: 20px;
        height: 20px;
        color: #5a250a;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <!-- ───────── Button Component ───────── -->
    <div class="button_wrap" data-huly-btn>
      <!-- Outer gradient glow layers -->
      <div class="button_outer_glow is-1" data-outer-glow></div>
      <div class="button_outer_glow is-2" data-outer-glow></div>
      <div class="button_outer_glow is-3" data-outer-glow></div>

      <!-- Border glow 1 (primary) -->
      <div class="button_border_glow" data-glow="primary">
        <div class="button_border_glow_inner"></div>
      </div>
      <!-- Border glow 2 (secondary / flipped) -->
      <div class="button_border_glow is-secondary" data-glow="secondary">
        <div class="button_border_glow_inner"></div>
      </div>

      <!-- CTA -->
      <div class="button_cta">
        <!-- Moving gradient -->
        <div class="button_gradient" data-gradient>
          <div class="button_gradient_circle"></div>
          <div class="button_gradient_ellipse"></div>
        </div>

        <div class="button_text">JETZT REGISTRIEREN</div>
        <div class="button_main_icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="100%"
            viewBox="0 0 20 20"
            fill="none"
            class="u-svg"
          >
            <path
              d="M15 6.66666L18.3333 9.99999L15 13.3333"
              stroke="currentColor"
              stroke-width="1.66667"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M1.66699 10H18.3337"
              stroke="currentColor"
              stroke-width="1.66667"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>
    </div>

    <!-- ───────── GSAP 3 ───────── -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // ── Selectors (updated to new class names) ──
        const btnWrap = document.querySelector("[data-huly-btn]");
        const cta = btnWrap.querySelector(".button_cta");
        const gradient = btnWrap.querySelector("[data-gradient]");
        const glowPrimary = btnWrap.querySelector('[data-glow="primary"]');
        const glowSecondary = btnWrap.querySelector('[data-glow="secondary"]');
        const outerGlows = btnWrap.querySelectorAll("[data-outer-glow]");

        // ── Config ──
        const GRADIENT_WIDTH = 204;
        const REST_X = 114;

        const CENTER_DEAD_ZONE = 0.25;

        // ── Resting state: glow visible on the right ──
        const REST_ANGLE = 90;
        const REST_OPACITY = 1;

        // ── Border glow rotation ──
        gsap.to(glowPrimary, {
          rotation: 360,
          duration: 3,
          repeat: -1,
          ease: "none",
        });

        gsap.to(glowSecondary, {
          rotation: 360,
          duration: 3,
          repeat: -1,
          ease: "none",
        });

        // ── Set outer glows to resting state (right-side glow visible) ──
        outerGlows.forEach((el) => {
          gsap.set(el, {
            "--glow-angle": `${REST_ANGLE}deg`,
            opacity: REST_OPACITY,
          });
        });

        // ── Helpers ──
        function getGlowParams(normalizedX) {
          const distFromCenter = Math.abs(normalizedX - 0.5) * 2;

          const opacity =
            distFromCenter <= CENTER_DEAD_ZONE
              ? 0
              : gsap.utils.mapRange(CENTER_DEAD_ZONE, 1, 0, 1, distFromCenter);

          const angle = gsap.utils.interpolate(270, 90, normalizedX);

          return { angle, opacity };
        }

        function updateOuterGlow(e) {
          const rect = cta.getBoundingClientRect();
          const normalizedX = gsap.utils.clamp(
            0,
            1,
            (e.clientX - rect.left) / rect.width
          );
          const { angle, opacity } = getGlowParams(normalizedX);

          outerGlows.forEach((el) => {
            gsap.to(el, {
              "--glow-angle": `${angle}deg`,
              opacity: opacity,
              duration: 0.4,
              ease: "power2.out",
              overwrite: "auto",
            });
          });
        }

        function resetOuterGlow() {
          outerGlows.forEach((el) => {
            gsap.to(el, {
              "--glow-angle": `${REST_ANGLE}deg`,
              opacity: REST_OPACITY,
              duration: 0.6,
              ease: "power3.out",
              overwrite: "auto",
            });
          });
        }

        // ── Inner gradient cursor-follow ──
        function moveGradient(e) {
          const rect = cta.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const targetX = mouseX - GRADIENT_WIDTH / 2;

          gsap.to(gradient, {
            x: targetX,
            duration: 0.5,
            ease: "power2.out",
            overwrite: "auto",
          });
        }

        function resetGradient() {
          gsap.to(gradient, {
            x: REST_X,
            duration: 0.6,
            ease: "power3.out",
            overwrite: "auto",
          });
        }

        // ── Events ──
        cta.addEventListener("mouseenter", (e) => {
          moveGradient(e);
          updateOuterGlow(e);

          gsap.to(glowSecondary, {
            opacity: 1,
            duration: 0.4,
            ease: "power1.out",
          });
        });

        cta.addEventListener("mousemove", (e) => {
          moveGradient(e);
          updateOuterGlow(e);
        });

        cta.addEventListener("mouseleave", () => {
          resetGradient();
          resetOuterGlow();

          gsap.to(glowSecondary, {
            opacity: 0,
            duration: 0.4,
            ease: "power1.out",
          });
        });
      });
    </script>
  </body>
</html>
