<script>
  const preloadImages = () => {
    return new Promise((resolve, reject) => {

  CustomEase.create("cEase", "0.65, 0.05, 0, 1");
  CustomEase.create("cEaseReverse", "1, 0, 0.35, 0.95");

  gsap.defaults({
    ease: "cEase",
    duration: 1,
  });

  gsap.registerEffect({
    name: "blink",
    effect: (target, config) => {
      if (config.direction === "to") {
        return gsap.to(target, {
          autoAlpha: config.autoAlpha || 0,
          duration: config.duration || 0.4,
          stagger: {
            from: config.from || "random",
            amount: config.amount || 0.1,
          },
          ease: "bounce.in",
        });
      } else {
        return gsap.from(target, {
          autoAlpha: config.autoAlpha || 0,
          duration: config.duration || 0.4,
          stagger: {
            from: config.from || "random",
            amount: config.amount || 0.1,
          },
          ease: "bounce.in",
        });
      }
    },
    extendTimeline: true,
  });

  function updateElementCounts() {
    const sourceElements = document.querySelectorAll("[data-count-name]");
    const displayElements = document.querySelectorAll("[data-count-number]");

    if (sourceElements.length === 0 || displayElements.length === 0) {
      console.warn("Missing source or display elements");
      return;
    }

    const counts = {};
    sourceElements.forEach((el) => {
      const name = el.dataset.countName;
      counts[name] = (counts[name] || 0) + 1;
    });

    displayElements.forEach((displayEl) => {
      const countKey = displayEl.dataset.countNumber;
      const countValue = counts[countKey] || 0;

      displayEl.textContent = countValue;

      displayEl.setAttribute("data-current-count", countValue);
    });

    return counts;
  }

  function heroVisualSlider() {
    const wrap = document.querySelector(".hero_wrap");

    if (!wrap) return;

    gsap.from(wrap, { autoAlpha: 0, duration: 2, delay: 0.4 });

    const swiperVisualEl = document.querySelector(".swiper.is-hero-bg");
    const swiperTextEl = document.querySelector(".swiper.is-hero-text");

    const swiperVisual = new Swiper(swiperVisualEl, {
      modules: [SwiperGL],
      effect: "gl",
      gl: { shader: "morph-x" },
      speed: 1200,
      loop: true,
      initialSlide: 0,
      allowTouchMove: false,
    });

    const swiperText = new Swiper(swiperTextEl, {
      slidesPerView: "auto",
      loop: true,
      speed: 1200,
      centeredSlides: true,
      grabCursor: true,
      initialSlide: 0,
      autoplay: {
        enabled: true,
        delay: 4000,
      },
    });

    swiperText.on("realIndexChange", (swiper) => {
      swiperVisual.slideToLoop(swiper.realIndex, 1200, false);
    });
  }

  function initCSSMarquee() {
    const pixelsPerSecond = 75; // Set the marquee speed (pixels per second)
    const marquees = document.querySelectorAll("[data-css-marquee]");

    // Duplicate each [data-css-marquee-list] element inside its container
    marquees.forEach((marquee) => {
      marquee.querySelectorAll("[data-css-marquee-list]").forEach((list) => {
        const duplicate = list.cloneNode(true);
        marquee.appendChild(duplicate);
      });
    });

    // Create an IntersectionObserver to check if the marquee container is in view
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          entry.target
            .querySelectorAll("[data-css-marquee-list]")
            .forEach(
              (list) =>
                (list.style.animationPlayState = entry.isIntersecting
                  ? "running"
                  : "paused")
            );
        });
      },
      { threshold: 0 }
    );

    // Calculate the width and set the animation duration accordingly
    marquees.forEach((marquee) => {
      marquee.querySelectorAll("[data-css-marquee-list]").forEach((list) => {
        list.style.animationDuration = list.offsetWidth / pixelsPerSecond + "s";
        list.style.animationPlayState = "paused";
      });
      observer.observe(marquee);
    });
  }

  function heroLoopAnim() {
    const wrapper = document.querySelector(".hero_title_value_wrap");
    const titles = gsap.utils.toArray(".hero_title_value", wrapper);

    if (titles.length === 0) {
      console.warn("Hero title elements (.hero_title_value) not found.");
      return;
    }

    const maxWidth = Math.max(...titles.map((title) => title.offsetWidth));

    gsap.set(wrapper, {
      height: titles[0].offsetHeight + "px",
      width: maxWidth * 1.1 + "px",
    });

    function animateNextTitle() {
      const currentTitle = wrapper.querySelector(".hero_title_value");

      const split = new SplitText(currentTitle, { type: "chars" });

      // const imageTransitionTween = sketch.next();

      gsap
        .timeline({
          onComplete: () => {
            split.revert();
            wrapper.appendChild(currentTitle);
            animateNextTitle();
          },
        })
        .fromTo(
          split.chars,
          {
            yPercent: 100,
          },
          {
            yPercent: 0,
            stagger: 0.015,
          }
        )
        // .add(imageTransitionTween, "<")
        .to(
          split.chars,
          {
            yPercent: -100,
            stagger: 0.015,
          },
          "+=2"
        );
    }

    animateNextTitle();
  }

  function buttonHoverAnim() {
    const buttons = gsap.utils.toArray(".button_main_wrap");

    if (!buttons.length) return null;

    const context = gsap.context(() => {
      buttons.forEach((button) => {
        const textEl = button.querySelector(".button_main_text");
        if (!textEl) return;

        const textElSplit = SplitText.create(textEl, {
          type: "lines, words, chars",
          mask: "lines",
          linesClass: "lines",
          charsClass: "char",
        });

        gsap.set(textElSplit.chars, { yPercent: 0 });

        // Create timeline with optimized settings

        const tl = gsap.timeline({
          paused: true,
          defaults: {
            duration: 0.6,
          },
        });

        // Optimized animation with will-change and force3D
        tl.to(textElSplit.chars, {
          yPercent: -100,
          stagger: 0.008,
          force3D: true,
        });

        // Use more performant event handling
        let isHovered = false;

        const handleMouseEnter = () => {
          if (!isHovered) {
            isHovered = true;
            tl.play();
          }
        };

        const handleMouseLeave = () => {
          if (isHovered) {
            isHovered = false;
            tl.reverse();
          }
        };

        button.addEventListener("mouseenter", handleMouseEnter, {
          passive: true,
        });
        button.addEventListener("mouseleave", handleMouseLeave, {
          passive: true,
        });

        // Store cleanup function
        button._cleanup = () => {
          button.removeEventListener("mouseenter", handleMouseEnter);
          button.removeEventListener("mouseleave", handleMouseLeave);
          textElSplit.revert();
          tl.kill();
        };
      });
    }, buttons);

    // Enhanced cleanup method
    context.cleanup = () => {
      buttons.forEach((button) => {
        if (button._cleanup) button._cleanup();
      });
      context.revert();
    };

    return context;
  }

  function cornerHoverAnim() {
    const triggers = document.querySelectorAll('[data-trigger="hover"]');

    if (!triggers.length) return;

    triggers.forEach((trigger) => {
      const corners = trigger.querySelectorAll('[data-blink-reveal="false"]');

      if (!corners.length) return;

      const tl = gsap.timeline({
        paused: true,
      });

      tl.blink(corners, { duration: 0.4, delay: 0.4 });

      trigger.addEventListener("mouseenter", () => {
        tl.play();
      });
      trigger.addEventListener("mouseleave", () => {
        tl.reverse();
      });
    });
  }

  function headingRevealAnim() {
    document.querySelectorAll("[data-word-reveal='true']").forEach((text) => {
      const split = SplitText.create(text.children, {
        type: "words, chars",
        mask: "words",
        wordsClass: "word",
        charsClass: "char",
      });

      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: text,
          start: "top bottom",
          end: "top 80%",
          toggleActions: "none play none none",
        },
      });
      tl.from(split.words, {
        yPercent: 120,
        delay: 0.5,
        duration: 0.8,
        filter: "blur(5px)",
        stagger: { amount: 0.15 },
      });

      gsap.set(text, { visibility: "visible" });
    });
  }

  function eyebrowAnim() {
    const wraps = document.querySelectorAll("[data-eyebrow-reveal=true]");

    wraps.forEach((wrap) => {
      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: wrap.parentNode,
          start: "top bottom",
          end: "top 80%",
          toggleActions: "none play none none",
        },
        defaults: { overwrite: true },
      });

      tl.blink(wrap, { duration: 0.4, delay: 0.4 });
    });
  }

  function aboutAnim() {
    const section = document.querySelector(".about_wrap");

    if (!section) return;

    const paragraph = section.querySelector(".about_text");

    let paragraphSplit = SplitText.create(paragraph, {
      type: "words, chars",
      wordsClass: "word",
      charsClass: "char",
    });

    let tl = gsap.timeline({
      scrollTrigger: {
        trigger: paragraph,
        start: "clamp(top 80%)",
        end: "clamp(bottom 80%)",
        scrub: true,
      },
    });

    tl.from(paragraphSplit.chars, {
      autoAlpha: 0.6,
      stagger: 0.15,
    });
  }

  function loaderAnim() {
    const loaderWrap = document.querySelector(".loader_wrap");

    if (!loaderWrap) return;

    const loaderLogo = loaderWrap.querySelector(".loader_logo");
    const loaderSVG = loaderWrap.querySelector("svg");
    const paths = gsap.utils.toArray("path", loaderSVG);
    const desktopLogomark = document.querySelector(".nav_desktop_logomark");
    const desktopLogotype = document.querySelector(".nav_desktop_logotype");
    const mobileLogomark = document.querySelector(".nav_mobile_logomark");
    const mobileLogotype = document.querySelector(".nav_mobile_logotype");

    const mm = gsap.matchMedia();
    let newContainer;
    let logoType;

    if (lenis) {
      lenis.stop();
    }

    mm.add(
      {
        isDesktop: "(min-width: 992px)",
        isTablet: "(max-width: 991px)",
      },
      (ctx) => {
        const { isDesktop, isTablet } = ctx.conditions;

        newContainer = isDesktop ? desktopLogomark : mobileLogomark;
        logoType = isDesktop ? desktopLogotype : mobileLogotype;

        const logoPaths = logoType.querySelectorAll("path");

        const state = Flip.getState(loaderSVG);

        const tl = gsap.timeline({
          onComplete: () => {
            const pulse = gsap.to(loaderSVG, {
              autoAlpha: 0.25,
              repeat: -1,
              duration: 1,
              yoyo: true,
            });

            preloadImages().then(() => {
              newContainer.prepend(loaderSVG);
              pulse.progress(0).pause();

              if (lenis) lenis.start();

              heroVisualSlider();

              const logoTl = gsap.timeline();

              logoTl
                .to(loaderWrap, { autoAlpha: 0 })
                .add(() => {
                  Flip.from(state, {
                    duration: 1,
                    ease: "power2.inOut",
                  });
                }, "<")
                .from(logoPaths, {
                  y: 50,
                  autoAlpha: 0,
                  duration: 1,
                  stagger: 0.01,
                });
            });
          },
        });
        gsap.set(paths, { drawSVG: 0 });
        gsap.set(loaderLogo, { autoAlpha: 1 });

        tl.to(paths, {
          delay: 0.85,
          drawSVG: "100%",
          ease: "none",
          duration: 0.85,
          stagger: { each: 0.75, from: "end" },
        });
      }
    );
  }

  document.addEventListener("DOMContentLoaded", () => {
    initPinLogo();
    initCSSMarquee();
    eyebrowAnim();
    cornerHoverAnim();
    updateElementCounts();
    heroVisualSlider();

    document.fonts.ready.then(() => {
      buttonHoverAnim();
      buttonIconHoverAnim();
      buttonLinkHoverAnim();
      aboutAnim();
      headingRevealAnim();
      ScrollTrigger.refresh();
    });
  });
</script>
