<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Overlay Transparent</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111; /* Background halaman gelap */
        font-family: sans-serif;
        overflow: hidden;
      }

      /* Simulasi konten di belakang canvas */
      .background-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        text-align: center;
        z-index: 0; /* Di belakang canvas */
      }
      .background-content h1 {
        font-size: 3rem;
        margin: 0;
      }
      .background-content p {
        color: #888;
      }

      /* Canvas Overlay */
      #canvas-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1; /* Di depan konten */
        pointer-events: none; /* Klik tembus ke konten belakang */
      }
    </style>
  </head>
  <body>
    <div class="background-content">
      <h1>CONTENT BEHIND</h1>
      <p>This text should be visible through the empty space.</p>
      <button style="pointer-events: auto; cursor: pointer; padding: 10px 20px">
        Click Me (Test)
      </button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
      import {
        Renderer,
        Program,
        Mesh,
        Color,
        Triangle,
      } from "https://esm.sh/ogl";

      const VERT = `#version 300 es
        in vec2 position;
        void main() {
            gl_Position = vec4(position, 0.0, 1.0);
        }
        `;

      const FRAG = `#version 300 es
        precision highp float;

        uniform float uTime;
        uniform float uAmplitude;
        uniform vec3 uColorStops[3];
        uniform vec2 uResolution;
        uniform float uBlend;
        uniform float uOpacity; // Tambahan uniform untuk kontrol opacity global

        out vec4 fragColor;

        vec3 permute(vec3 x) { return mod(((x * 34.0) + 1.0) * x, 289.0); }
        float snoise(vec2 v){
            const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy));
            vec2 x0 = v - i + dot(i, C.xx);
            vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod(i, 289.0);
            vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
            vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
            m = m * m; m = m * m;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }

        struct ColorStop { vec3 color; float position; };

        #define COLOR_RAMP(colors, factor, finalColor) { \
            int index = 0; \
            for (int i = 0; i < 2; i++) { \
               ColorStop currentColor = colors[i]; \
               bool isInBetween = currentColor.position <= factor; \
               index = int(mix(float(index), float(i), float(isInBetween))); \
            } \
            ColorStop currentColor = colors[index]; \
            ColorStop nextColor = colors[index + 1]; \
            float range = nextColor.position - currentColor.position; \
            float lerpFactor = (factor - currentColor.position) / range; \
            finalColor = mix(currentColor.color, nextColor.color, lerpFactor); \
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / uResolution;
            
            ColorStop colors[3];
            colors[0] = ColorStop(uColorStops[0], 0.0);
            colors[1] = ColorStop(uColorStops[1], 0.5);
            colors[2] = ColorStop(uColorStops[2], 1.0);
            
            vec3 rampColor;
            COLOR_RAMP(colors, uv.x, rampColor);
            
            float height = snoise(vec2(uv.x * 2.0 + uTime * 0.1, uTime * 0.25)) * 0.5 * uAmplitude;
            height = exp(height);
            
            // Logic agar aurora di bawah: (1.0 - uv.y)
            height = ((1.0 - uv.y) * 2.0 - height + 0.2);
            float intensity = 0.6 * height;
            
            float midPoint = 0.20;
            
            // Hitung alpha dasar berdasarkan bentuk gelombang
            float auroraAlpha = smoothstep(midPoint - uBlend * 0.5, midPoint + uBlend * 0.5, intensity);
            
            // KUNCI: Kalikan alpha dengan Opacity Global (0.8)
            auroraAlpha *= uOpacity;
            
            vec3 auroraColor = intensity * rampColor;
            
            // Premultiplied alpha: Color * Alpha, Alpha
            fragColor = vec4(auroraColor * auroraAlpha, auroraAlpha);
        }
        `;

      class Aurora {
        constructor(selector, options = {}) {
          this.ctn = document.querySelector(selector);
          if (!this.ctn) return;

          this.config = {
            colorStops: ["#5227FF", "#7cff67", "#5227FF"],
            amplitude: 1.0,
            blend: 0.5,
            speed: 1.0,
            opacity: 0.8, // Opacity global untuk aurora
            ...options,
          };

          // Setup Renderer Transparan
          this.renderer = new Renderer({
            alpha: true, // PENTING: izinkan transparansi
            premultipliedAlpha: true,
            antialias: true,
          });

          this.gl = this.renderer.gl;

          // Clear color 0,0,0,0 (Transparan total untuk area kosong)
          this.gl.clearColor(0, 0, 0, 0);

          this.gl.enable(this.gl.BLEND);
          this.gl.blendFunc(this.gl.ONE, this.gl.ONE_MINUS_SRC_ALPHA);

          this.ctn.appendChild(this.gl.canvas);

          this.resize = this.resize.bind(this);
          this.update = this.update.bind(this);

          this.init();

          window.addEventListener("resize", this.resize);
          requestAnimationFrame(this.update);
        }

        init() {
          const geometry = new Triangle(this.gl);
          if (geometry.attributes.uv) delete geometry.attributes.uv;

          const colorStopsArray = this.config.colorStops.map((hex) => {
            const c = new Color(hex);
            return [c.r, c.g, c.b];
          });

          this.program = new Program(this.gl, {
            vertex: VERT,
            fragment: FRAG,
            uniforms: {
              uTime: { value: 0 },
              uAmplitude: { value: this.config.amplitude },
              uColorStops: { value: colorStopsArray },
              uResolution: {
                value: [this.ctn.offsetWidth, this.ctn.offsetHeight],
              },
              uBlend: { value: this.config.blend },
              uOpacity: { value: this.config.opacity }, // Kirim nilai opacity
            },
          });

          this.mesh = new Mesh(this.gl, { geometry, program: this.program });
          this.resize();
        }

        resize() {
          if (!this.ctn) return;
          const width = this.ctn.offsetWidth;
          const height = this.ctn.offsetHeight;
          this.renderer.setSize(width, height);
          if (this.program) {
            this.program.uniforms.uResolution.value = [width, height];
          }
        }

        update(t) {
          requestAnimationFrame(this.update);
          const time = t * 0.01;
          this.program.uniforms.uTime.value = time * this.config.speed * 0.1;
          this.renderer.render({ scene: this.mesh });
        }
      }

      // Jalankan
      new Aurora("#canvas-container", {
        opacity: 0.8, // Anda bisa atur opacity di sini (0.0 - 1.0)
      });
    </script>
  </body>
</html>
